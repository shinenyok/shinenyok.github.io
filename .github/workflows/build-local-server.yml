name: Build Cotool Local Server

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "local-server-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            executable: cotool-local-server
            asset_name: cotool-local-server-linux-x64.tar.gz
          - os: macos-13
            executable: cotool-local-server
            asset_name: cotool-local-server-macos-x64.tar.gz
          - os: windows-latest
            executable: cotool-local-server.exe
            asset_name: cotool-local-server-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Compile local server
        shell: bash
        run: |
          mkdir -p dist
          dart compile exe tool/local_converter_server.dart -o "dist/${{ matrix.executable }}"

      - name: Package Unix executable
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "dist/${{ matrix.asset_name }}" -C dist "${{ matrix.executable }}"

      - name: Package Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${{ matrix.executable }}" -DestinationPath "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
